<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        * { margin:0;padding:0;box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 22px;
            color: #333;
        }
        .login-box .sub {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 28px;
        }
        .login-box label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-box input:focus {
            border-color: #4a90d9;
        }
        .login-box button {
            width: 100%;
            padding: 13px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-box button:hover {
            background: #357abd;
        }
        .error-msg {
            color: #d93025;
            font-size: 13px;
            text-align: center;
            margin-bottom: 16px;
            padding: 10px;
            background: #fce8e6;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Sign In</h2>
        <p class="sub">Enter your credentials to continue</p>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form action="{{ login_path }}" method="POST">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Enter username" required autocomplete="off">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter password" required autocomplete="off">
            <button type="submit">Sign In</button>
        </form>
    </div>
    {{ extra_scripts|safe }}
</body>
</html>
