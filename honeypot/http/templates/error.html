<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        * { margin:0;padding:0;box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .error-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        .error-box .icon { font-size: 48px; margin-bottom: 16px; }
        .error-box h2 { font-size: 20px; color: #333; margin-bottom: 8px; }
        .error-box p { font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="error-box">
        <p>{{ message }}</p>
    </div>
    {{ extra_scripts|safe }}
</body>
</html>
